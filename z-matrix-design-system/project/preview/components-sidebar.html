<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0;background:#0B0C10;font-family:var(--zm-font-body)} 
.wrap{padding:18px;display:flex;gap:16px;align-items:flex-start}
.sb{width:240px;background:#171923;border:1px solid #262A38;border-radius:12px;padding:14px 10px;display:flex;flex-direction:column;gap:2px}
.hd{display:flex;align-items:center;gap:10px;padding:6px 8px 14px;border-bottom:1px solid #262A38;margin-bottom:8px}
.mark{width:24px;height:24px}
.wm{color:#E2E8F0;font-family:var(--zm-font-display);font-weight:800;font-size:14px;letter-spacing:0.08em}
.wm span{font-weight:400;letter-spacing:0.34em;font-size:11px;margin-left:4px;color:#B4BBC9}
.it{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;font-family:var(--zm-font-body);font-size:13px;color:#B4BBC9;cursor:pointer}
.it:hover{background:#20243A;color:#E2E8F0}
.it.act{background:rgba(0,180,216,0.12);color:#E2E8F0;font-weight:600;position:relative}
.it.act::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:2px;background:#00B4D8;border-radius:2px}
.cnt{margin-left:auto;font-family:var(--zm-font-mono);font-size:11px;color:#7C8499}
.it.act .cnt{color:#00B4D8}
.section{font-family:var(--zm-font-body);font-weight:600;font-size:9.5px;letter-spacing:0.14em;text-transform:uppercase;color:#525A6F;padding:14px 10px 6px}
.ico{width:16px;height:16px;flex:0 0 16px;color:#7C8499}
.it.act .ico{color:#00B4D8}
</style></head>
<body data-theme="dark"><div class="wrap">
<aside class="sb">
  <div class="hd">
    <svg class="mark" viewBox="0 0 64 64" fill="none"><g stroke="#00B4D8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M14 14 L48 14"/><path d="M48 14.6 L19 47.4"/><path d="M16 50 L50 50"/><path d="M14 14 L22 6 L56 6" opacity="0.7"/><path d="M56 6.4 L56 42" opacity="0.7"/><path d="M56 42.2 L50 50" opacity="0.7"/></g></svg>
    <span class="wm">Z<span>MATRIX</span></span>
  </div>
  <div class="it act"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Sites in motion</div>
  <div class="it"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg>Pipeline<span class="cnt">9</span></div>
  <div class="it"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 2l9 4v6c0 5-3.5 9.7-9 10-5.5-.3-9-5-9-10V6z"/></svg>Shortlist<span class="cnt">3</span></div>
  <div class="it"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M2 9l10-6 10 6-10 6z"/><path d="M2 9v6l10 6 10-6V9"/></svg>Staging<span class="cnt">7</span></div>
  <div class="section">Modules</div>
  <div class="it"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 7h18M3 12h18M3 17h18"/></svg>Legal</div>
  <div class="it"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>Activity</div>
</aside>
</div></body></html>
