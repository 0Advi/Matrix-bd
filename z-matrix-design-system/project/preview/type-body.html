<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0;background:var(--zm-bg);font-family:var(--zm-font-body)}
.wrap{padding:24px 28px;display:flex;flex-direction:column;gap:14px;max-width:660px}
.row{display:flex;align-items:baseline;gap:18px}
.spec{color:var(--zm-fg-3);font-family:var(--zm-font-mono);font-size:11px;min-width:130px;white-space:nowrap}
.eyebrow{font-family:var(--zm-font-body);font-weight:600;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--zm-fg-3)}
.body-lg{font-family:var(--zm-font-body);font-weight:400;font-size:16px;line-height:1.65;color:var(--zm-fg-2)}
.body{font-family:var(--zm-font-body);font-weight:400;font-size:14px;line-height:1.5;color:var(--zm-fg-2)}
.meta{font-family:var(--zm-font-body);font-weight:400;font-size:13px;color:var(--zm-fg-3)}
.label{font-family:var(--zm-font-body);font-weight:600;font-size:12px;color:var(--zm-fg)}
</style></head>
<body><div class="wrap">
<div class="row"><span class="spec">Eyebrow · 11 · +0.14em</span><span class="eyebrow">Site fundamentals</span></div>
<div class="row"><span class="spec">Body lg · Inter 16</span><span class="body-lg">LOI signed 12 days ago. Supervisor approval pending.</span></div>
<div class="row"><span class="spec">Body · Inter 14</span><span class="body">Default for nav, buttons, form labels and table cells.</span></div>
<div class="row"><span class="spec">Meta · 13 · muted</span><span class="meta">Last sync 2 min ago · 4 events behind</span></div>
<div class="row"><span class="spec">Form label · 12 · 600</span><span class="label">Carpet area (sq ft)</span></div>
</div></body></html>
