<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0;background:var(--zm-bg);font-family:var(--zm-font-body)}
.wrap{padding:24px 28px;display:flex;flex-direction:column;gap:8px}
.row{display:flex;align-items:baseline;gap:18px}
.spec{color:var(--zm-fg-3);font-family:var(--zm-font-mono);font-size:11px;letter-spacing:0;white-space:nowrap;min-width:120px}
.hero{font-family:var(--zm-font-display);font-weight:800;font-size:48px;line-height:1.05;letter-spacing:-0.025em;color:var(--zm-fg)}
.h1{font-family:var(--zm-font-display);font-weight:700;font-size:34px;line-height:1.1;letter-spacing:-0.02em;color:var(--zm-fg)}
.h2{font-family:var(--zm-font-display);font-weight:600;font-size:24px;line-height:1.2;letter-spacing:-0.01em;color:var(--zm-fg)}
.h3{font-family:var(--zm-font-display);font-weight:600;font-size:18px;color:var(--zm-fg)}
</style></head>
<body><div class="wrap">
<div class="row"><span class="spec">Hero · 800 · 56</span><span class="hero">Sites in pipeline</span></div>
<div class="row"><span class="spec">H1 · 700 · 40</span><span class="h1">Shortlist queue</span></div>
<div class="row"><span class="spec">H2 · 600 · 28</span><span class="h2">Mumbai · 14 sites</span></div>
<div class="row"><span class="spec">H3 · 600 · 20</span><span class="h3">Pending supervisor review</span></div>
</div></body></html>
