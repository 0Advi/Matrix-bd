<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0;background:var(--zm-bg);font-family:var(--zm-font-body)}
.wrap{padding:24px 28px;display:flex;align-items:flex-end;gap:18px}
.col{display:flex;flex-direction:column;align-items:center;gap:8px}
.bar{background:var(--zm-accent);border-radius:3px;width:36px}
.tok{font-family:var(--zm-font-mono);font-size:11px;color:var(--zm-fg-3)}
.val{font-family:var(--zm-font-mono);font-size:12px;color:var(--zm-fg);font-weight:600}
</style></head>
<body><div class="wrap">
<div class="col"><div class="bar" style="height:4px"></div><span class="val">4</span><span class="tok">s-1</span></div>
<div class="col"><div class="bar" style="height:8px"></div><span class="val">8</span><span class="tok">s-2</span></div>
<div class="col"><div class="bar" style="height:12px"></div><span class="val">12</span><span class="tok">s-3</span></div>
<div class="col"><div class="bar" style="height:16px"></div><span class="val">16</span><span class="tok">s-4</span></div>
<div class="col"><div class="bar" style="height:24px"></div><span class="val">24</span><span class="tok">s-5</span></div>
<div class="col"><div class="bar" style="height:32px"></div><span class="val">32</span><span class="tok">s-6</span></div>
<div class="col"><div class="bar" style="height:48px"></div><span class="val">48</span><span class="tok">s-7</span></div>
<div class="col"><div class="bar" style="height:64px"></div><span class="val">64</span><span class="tok">s-8</span></div>
<div class="col"><div class="bar" style="height:96px"></div><span class="val">96</span><span class="tok">s-9</span></div>
</div></body></html>
