<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0;background:var(--zm-bg);font-family:var(--zm-font-body)}
.wrap{padding:22px 24px;display:flex;flex-direction:column;gap:0}
.row{display:flex;align-items:baseline;gap:14px;padding:6px 0;border-bottom:1px dashed var(--zm-line-faint)}
.row:last-child{border:none}
.tag{font-family:var(--zm-font-mono);font-size:10px;color:var(--zm-fg-3);min-width:72px}
.spec{font-family:var(--zm-font-mono);font-size:10px;color:var(--zm-fg-4);min-width:120px}
.demo{font-family:var(--zm-font-display);color:var(--zm-fg);font-weight:700;letter-spacing:-0.02em}
.s56{font-size:56px;line-height:1}.s40{font-size:40px;line-height:1.1}.s28{font-size:28px;font-weight:600}.s20{font-size:20px;font-weight:600}.s16{font-size:16px;font-weight:600}.s14{font-family:var(--zm-font-body);font-size:14px;font-weight:400;letter-spacing:0;color:var(--zm-fg-2)}.s12{font-family:var(--zm-font-body);font-size:12px;font-weight:400;letter-spacing:0;color:var(--zm-fg-3)}
</style></head>
<body><div class="wrap">
<div class="row"><span class="tag">Hero</span><span class="spec">Jakarta 800 · 56 / 1.05</span><span class="demo s56">Aa 1234</span></div>
<div class="row"><span class="tag">H1</span><span class="spec">Jakarta 700 · 40 / 1.10</span><span class="demo s40">Aa 1234</span></div>
<div class="row"><span class="tag">H2</span><span class="spec">Jakarta 600 · 28 / 1.20</span><span class="demo s28">Aa 1234</span></div>
<div class="row"><span class="tag">H3</span><span class="spec">Jakarta 600 · 20 / 1.28</span><span class="demo s20">Aa 1234</span></div>
<div class="row"><span class="tag">H4</span><span class="spec">Jakarta 600 · 16 / 1.28</span><span class="demo s16">Aa 1234</span></div>
<div class="row"><span class="tag">Body</span><span class="spec">Inter 400 · 14 / 1.50</span><span class="demo s14">Aa 1234 · The quick brown fox</span></div>
<div class="row"><span class="tag">Meta</span><span class="spec">Inter 400 · 12 / 1.50</span><span class="demo s12">Aa 1234 · The quick brown fox</span></div>
</div></body></html>
