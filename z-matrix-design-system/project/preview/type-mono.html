<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0;background:var(--zm-bg);font-family:var(--zm-font-body)}
.wrap{padding:20px 28px;display:grid;grid-template-columns:1fr 1fr;gap:24px}
.box{display:flex;flex-direction:column;gap:8px}
.eyebrow{font-family:var(--zm-font-body);font-weight:600;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--zm-fg-3)}
.hero{font-family:var(--zm-font-mono);font-feature-settings:'tnum' 1;font-weight:600;font-size:54px;letter-spacing:-0.02em;color:var(--zm-fg);line-height:1}
.rule{width:48px;height:2px;background:linear-gradient(90deg,#D97706 0%,#D97706 60%,transparent 100%)}
.delta{display:inline-flex;align-items:center;gap:4px;font-family:var(--zm-font-mono);font-size:13px;font-weight:500;color:#047857}
.id{font-family:var(--zm-font-mono);font-size:14px;color:var(--zm-fg);font-weight:500;letter-spacing:0}
.id-row{display:flex;flex-direction:column;gap:4px}
.cap{font-family:var(--zm-font-body);font-size:11px;color:var(--zm-fg-3)}
.table{font-family:var(--zm-font-mono);font-feature-settings:'tnum' 1;font-size:14px;color:var(--zm-fg);display:grid;grid-template-columns:1fr 1fr;row-gap:4px;column-gap:24px}
.table .k{color:var(--zm-fg-3);font-family:var(--zm-font-body);font-size:12px}
</style></head>
<body><div class="wrap">
  <div class="box">
    <span class="eyebrow">Total op cost · monthly</span>
    <span class="hero">₹1,42,000</span>
    <div class="rule"></div>
    <span class="delta">▲ 8.4% vs city avg</span>
  </div>
  <div class="box">
    <span class="eyebrow">Mono in use</span>
    <div class="id-row"><span class="id">CA-2026-MUM-0481</span><span class="cap">CA code</span></div>
    <div class="id-row"><span class="id">site_a8f3c129</span><span class="cap">Site ID</span></div>
    <div class="table">
      <span class="k">Carpet</span><span>1,240 sqft</span>
      <span class="k">Rent</span><span>₹98,000</span>
      <span class="k">CAM</span><span>₹22,400</span>
      <span class="k">Lock-in</span><span>36 mo</span>
    </div>
  </div>
</div></body></html>
