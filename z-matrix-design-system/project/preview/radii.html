<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0;background:var(--zm-bg);font-family:var(--zm-font-body)}
.wrap{padding:24px 28px;display:flex;align-items:center;gap:24px;flex-wrap:wrap}
.col{display:flex;flex-direction:column;align-items:center;gap:10px}
.box{width:72px;height:72px;background:var(--zm-surface);border:1px solid var(--zm-line);display:flex;align-items:center;justify-content:center;font-family:var(--zm-font-mono);font-size:12px;color:var(--zm-fg-3)}
.tok{font-family:var(--zm-font-mono);font-size:11px;color:var(--zm-fg-3)}
.val{font-family:var(--zm-font-mono);font-size:12px;color:var(--zm-fg);font-weight:600}
</style></head>
<body><div class="wrap">
<div class="col"><div class="box" style="border-radius:4px">4</div><span class="val">4px</span><span class="tok">r-1 · chip</span></div>
<div class="col"><div class="box" style="border-radius:6px">6</div><span class="val">6px</span><span class="tok">r-2 · input</span></div>
<div class="col"><div class="box" style="border-radius:10px">10</div><span class="val">10px</span><span class="tok">r-3 · card</span></div>
<div class="col"><div class="box" style="border-radius:14px">14</div><span class="val">14px</span><span class="tok">r-4 · modal</span></div>
<div class="col"><div class="box" style="border-radius:20px">20</div><span class="val">20px</span><span class="tok">r-5 · sheet</span></div>
<div class="col"><div class="box" style="border-radius:999px;width:96px">pill</div><span class="val">999px</span><span class="tok">r-pill · tag</span></div>
</div></body></html>
