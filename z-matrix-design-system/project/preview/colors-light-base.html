<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0;background:var(--zm-bg);font-family:var(--zm-font-body);color:var(--zm-fg)}
.wrap{padding:20px 24px;display:flex;flex-direction:column;gap:12px}
.row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.sw{border-radius:8px;border:1px solid var(--zm-line);overflow:hidden;background:var(--zm-surface)}
.chip{height:64px}
.meta{padding:8px 10px;font-family:var(--zm-font-mono);font-size:11px;color:var(--zm-fg-3);display:flex;justify-content:space-between;border-top:1px solid var(--zm-line)}
.name{color:var(--zm-fg);font-family:var(--zm-font-body);font-weight:600;font-size:11px;letter-spacing:0.08em;text-transform:uppercase}
</style></head>
<body><div class="wrap">
<div class="row">
  <div class="sw"><div class="chip" style="background:#F5F7FA"></div><div class="meta"><span class="name">Ice Quartz</span><span>F5F7FA</span></div></div>
  <div class="sw"><div class="chip" style="background:#FFFFFF;border-bottom:1px solid var(--zm-line)"></div><div class="meta"><span class="name">Pure White</span><span>FFFFFF</span></div></div>
  <div class="sw"><div class="chip" style="background:#EEF1F5"></div><div class="meta"><span class="name">Sunken</span><span>EEF1F5</span></div></div>
  <div class="sw"><div class="chip" style="background:#E1E5EB"></div><div class="meta"><span class="name">Line</span><span>E1E5EB</span></div></div>
  <div class="sw"><div class="chip" style="background:#C9CFD8"></div><div class="meta"><span class="name">Line Strong</span><span>C9CFD8</span></div></div>
</div>
<div class="row">
  <div class="sw"><div class="chip" style="background:#111827"></div><div class="meta"><span class="name">Deep Slate</span><span>111827</span></div></div>
  <div class="sw"><div class="chip" style="background:#374151"></div><div class="meta"><span class="name">Slate 2</span><span>374151</span></div></div>
  <div class="sw"><div class="chip" style="background:#6B7280"></div><div class="meta"><span class="name">Muted</span><span>6B7280</span></div></div>
  <div class="sw"><div class="chip" style="background:#9CA3AF"></div><div class="meta"><span class="name">Disabled</span><span>9CA3AF</span></div></div>
  <div class="sw"><div class="chip" style="background:#FAFBFC;border-bottom:1px solid var(--zm-line)"></div><div class="meta"><span class="name">Surface 2</span><span>FAFBFC</span></div></div>
</div>
</div></body></html>
