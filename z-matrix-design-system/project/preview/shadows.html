<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0;background:var(--zm-bg);font-family:var(--zm-font-body)}
.wrap{padding:28px;display:flex;align-items:center;gap:24px}
.col{display:flex;flex-direction:column;align-items:center;gap:12px}
.box{width:110px;height:80px;background:var(--zm-surface);border:1px solid var(--zm-line);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:var(--zm-font-mono);font-size:11px;color:var(--zm-fg-3)}
.tok{font-family:var(--zm-font-mono);font-size:11px;color:var(--zm-fg-3);text-align:center}
.val{font-family:var(--zm-font-body);font-weight:600;font-size:12px;color:var(--zm-fg)}
.s1{box-shadow:var(--zm-shadow-1)}
.s2{box-shadow:var(--zm-shadow-2)}
.s3{box-shadow:var(--zm-shadow-3)}
.spop{box-shadow:var(--zm-shadow-pop)}
.ring{box-shadow:var(--zm-ring-focus);border-color:var(--zm-accent)}
</style></head>
<body><div class="wrap">
<div class="col"><div class="box s1">elev 1</div><span class="val">Sticky · hover</span><span class="tok">shadow-1</span></div>
<div class="col"><div class="box s2">elev 2</div><span class="val">Card</span><span class="tok">shadow-2</span></div>
<div class="col"><div class="box s3">elev 3</div><span class="val">Modal · popover</span><span class="tok">shadow-3</span></div>
<div class="col"><div class="box spop">elev 4</div><span class="val">Toast · palette</span><span class="tok">shadow-pop</span></div>
<div class="col"><div class="box ring">focus</div><span class="val">Focus ring</span><span class="tok">3px · 18% teal</span></div>
</div></body></html>
