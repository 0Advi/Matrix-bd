<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0;background:var(--zm-bg);font-family:var(--zm-font-body);color:var(--zm-fg)}
[data-theme="dark"]{}
.wrap{padding:20px 24px;display:flex;flex-direction:column;gap:12px;background:#0B0C10;min-height:100%}
.row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.sw{border-radius:8px;border:1px solid #262A38;overflow:hidden;background:#171923}
.chip{height:64px}
.meta{padding:8px 10px;font-family:var(--zm-font-mono);font-size:11px;color:#7C8499;display:flex;justify-content:space-between;border-top:1px solid #262A38}
.name{color:#E2E8F0;font-family:var(--zm-font-body);font-weight:600;font-size:11px;letter-spacing:0.08em;text-transform:uppercase}
</style></head>
<body data-theme="dark"><div class="wrap">
<div class="row">
  <div class="sw"><div class="chip" style="background:#0B0C10;border-bottom:1px solid #262A38"></div><div class="meta"><span class="name">Obsidian</span><span>0B0C10</span></div></div>
  <div class="sw"><div class="chip" style="background:#111319"></div><div class="meta"><span class="name">BG 2</span><span>111319</span></div></div>
  <div class="sw"><div class="chip" style="background:#171923"></div><div class="meta"><span class="name">Midnight</span><span>171923</span></div></div>
  <div class="sw"><div class="chip" style="background:#1D2030"></div><div class="meta"><span class="name">Surface 2</span><span>1D2030</span></div></div>
  <div class="sw"><div class="chip" style="background:#20243A"></div><div class="meta"><span class="name">Hover</span><span>20243A</span></div></div>
</div>
<div class="row">
  <div class="sw"><div class="chip" style="background:#E2E8F0"></div><div class="meta"><span class="name">Platinum</span><span>E2E8F0</span></div></div>
  <div class="sw"><div class="chip" style="background:#B4BBC9"></div><div class="meta"><span class="name">FG 2</span><span>B4BBC9</span></div></div>
  <div class="sw"><div class="chip" style="background:#7C8499"></div><div class="meta"><span class="name">Muted</span><span>7C8499</span></div></div>
  <div class="sw"><div class="chip" style="background:#353B4C"></div><div class="meta"><span class="name">Line Strong</span><span>353B4C</span></div></div>
  <div class="sw"><div class="chip" style="background:#262A38"></div><div class="meta"><span class="name">Line</span><span>262A38</span></div></div>
</div>
</div></body></html>
