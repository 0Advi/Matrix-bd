<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0;background:var(--zm-bg);font-family:var(--zm-font-body)}
.wrap{padding:24px 28px;display:grid;grid-template-columns:1.2fr 1fr;gap:24px;align-items:center}
.panel{background:#FFFFFF;border:1px solid #E1E5EB;border-radius:12px;height:200px;position:relative;overflow:hidden;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='40' height='40' viewBox='0 0 40 40'><path d='M40 0 L0 0 0 40' fill='none' stroke='%23111827' stroke-width='0.5' opacity='0.06'/></svg>");background-size:40px 40px}
.note{position:absolute;top:14px;left:18px;font-family:var(--zm-font-mono);font-size:10.5px;color:#6B7280;letter-spacing:0.04em}
.crosshair{position:absolute;left:50%;top:50%;width:36px;height:36px;border:1px solid #005F60;border-radius:50%;transform:translate(-50%,-50%)}
.crosshair::before, .crosshair::after{content:"";position:absolute;background:#005F60}
.crosshair::before{left:50%;top:-12px;bottom:-12px;width:1px;transform:translateX(-50%)}
.crosshair::after{top:50%;left:-12px;right:-12px;height:1px;transform:translateY(-50%)}
.coord{position:absolute;right:14px;bottom:14px;font-family:var(--zm-font-mono);font-size:11px;color:#005F60;letter-spacing:0}
.dot{position:absolute;left:24%;top:36%;width:8px;height:8px;border-radius:999px;background:#D97706;box-shadow:0 0 0 6px rgba(217,119,6,0.18)}
.dot2{left:70%;top:62%;background:#005F60;box-shadow:0 0 0 6px rgba(0,95,96,0.16)}
.copy h3{font-family:var(--zm-font-display);font-weight:700;font-size:22px;letter-spacing:-0.02em;color:var(--zm-fg);margin:0 0 8px}
.copy p{font-family:var(--zm-font-body);font-size:13px;line-height:1.55;color:var(--zm-fg-2);margin:0 0 8px}
.spec{font-family:var(--zm-font-mono);font-size:11px;color:var(--zm-fg-3)}
</style></head>
<body><div class="wrap">
<div class="panel">
  <span class="note">40 × 40 cell · 0.5px stroke · 4% alpha</span>
  <span class="coord">23.0586° N · 72.5854° E</span>
  <div class="crosshair"></div>
  <div class="dot"></div>
  <div class="dot dot2"></div>
</div>
<div class="copy">
  <h3>The blueprint grid</h3>
  <p>Z-Matrix's signature background. Architectural reference, never decoration — you should feel it more than see it.</p>
  <p class="spec">--zm-grid · rgba(17,24,39,0.04) · cell 40px</p>
</div>
</div></body></html>
