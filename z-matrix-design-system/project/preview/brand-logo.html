<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0;font-family:var(--zm-font-body)}
.wrap{display:grid;grid-template-columns:1fr 1fr;min-height:100%}
.cell{padding:28px 32px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:14px}
.l{background:#F5F7FA}
.d{background:#0B0C10}
.lbl{font-family:var(--zm-font-body);font-weight:600;font-size:10px;letter-spacing:0.14em;text-transform:uppercase}
.l .lbl{color:#6B7280}
.d .lbl{color:#7C8499}
.mark{width:84px;height:84px}
.wordmark{height:54px}
</style></head>
<body><div class="wrap">
<div class="cell l">
  <img class="mark" src="../assets/zmatrix-mark.svg"/>
  <img class="wordmark" src="../assets/zmatrix-wordmark.svg"/>
  <span class="lbl">Light · Matrix Teal</span>
</div>
<div class="cell d">
  <img class="mark" src="../assets/zmatrix-mark-dark.svg"/>
  <img class="wordmark" src="../assets/zmatrix-wordmark-dark.svg"/>
  <span class="lbl">Dark · Cyber Teal</span>
</div>
</div></body></html>
