<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0;background:var(--zm-bg);font-family:var(--zm-font-body)}
.wrap{padding:22px 24px}
.lbl{font-family:var(--zm-font-body);font-weight:600;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--zm-fg-3);margin:0 0 12px}
.track{display:grid;grid-template-columns:repeat(5,1fr);gap:0;border:1px solid var(--zm-line);border-radius:10px;overflow:hidden;background:var(--zm-surface)}
.stage{padding:16px 12px;display:flex;flex-direction:column;align-items:center;gap:8px;border-right:1px solid var(--zm-line)}
.stage:last-child{border-right:none}
.bar{width:100%;height:4px;border-radius:2px}
.dot{width:10px;height:10px;border-radius:999px}
.name{font-family:var(--zm-font-body);font-weight:600;font-size:11.5px;color:var(--zm-fg);text-align:center;line-height:1.3}
.hex{font-family:var(--zm-font-mono);font-size:10px;color:var(--zm-fg-3)}
</style></head>
<body><div class="wrap">
<div class="lbl">Workflow stage colors · new-store-folder</div>
<div class="track">
  <div class="stage"><div class="bar" style="background:#6B7280"></div><div class="dot" style="background:#6B7280"></div><div class="name">Draft</div><div class="hex">#6B7280</div></div>
  <div class="stage"><div class="bar" style="background:#1E40AF"></div><div class="dot" style="background:#1E40AF"></div><div class="name">Shortlist</div><div class="hex">#1E40AF</div></div>
  <div class="stage"><div class="bar" style="background:#D97706"></div><div class="dot" style="background:#D97706"></div><div class="name">Staging · LOI</div><div class="hex">#D97706</div></div>
  <div class="stage"><div class="bar" style="background:#B91C1C"></div><div class="dot" style="background:#B91C1C"></div><div class="name">Overdue</div><div class="hex">#B91C1C</div></div>
  <div class="stage"><div class="bar" style="background:#047857"></div><div class="dot" style="background:#047857"></div><div class="name">LOI uploaded</div><div class="hex">#047857</div></div>
</div>
</div></body></html>
