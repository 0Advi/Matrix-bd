<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0;background:var(--zm-bg);font-family:var(--zm-font-body)}
.wrap{padding:22px 24px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.item{border:1px solid var(--zm-line);border-radius:10px;background:var(--zm-surface);overflow:hidden}
.bar{height:42px;display:flex;align-items:center;padding:0 12px;font-family:var(--zm-font-mono);font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase}
.body{padding:10px 12px;display:flex;justify-content:space-between;align-items:center;font-family:var(--zm-font-mono);font-size:11px}
.body .name{color:var(--zm-fg);font-family:var(--zm-font-body);font-weight:600;font-size:12px;letter-spacing:0}
.dot{width:8px;height:8px;border-radius:999px;display:inline-block;margin-right:6px}
</style></head>
<body><div class="wrap">
  <div class="item"><div class="bar" style="background:#D5F0E2;color:#047857"><span class="dot" style="background:#047857"></span>SUCCESS</div><div class="body"><span class="name">Approved</span><span>#047857</span></div></div>
  <div class="item"><div class="bar" style="background:#FCE8C3;color:#B45309"><span class="dot" style="background:#B45309"></span>WARNING</div><div class="body"><span class="name">LOI pending</span><span>#B45309</span></div></div>
  <div class="item"><div class="bar" style="background:#FBE0E0;color:#B91C1C"><span class="dot" style="background:#B91C1C"></span>DANGER</div><div class="body"><span class="name">Rejected</span><span>#B91C1C</span></div></div>
  <div class="item"><div class="bar" style="background:#DBE5FB;color:#1E40AF"><span class="dot" style="background:#1E40AF"></span>INFO</div><div class="body"><span class="name">In review</span><span>#1E40AF</span></div></div>
</div></body></html>
