<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8"/>
  <title>Z-Matrix · Workspace</title>
  <link rel="icon" href="../../assets/zmatrix-favicon.svg"/>
  <link rel="stylesheet" href="../../colors_and_type.css"/>
  <style>
    html, body, #root { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
    body { background: #0B0C10; color: #E2E8F0; font-family: var(--zm-font-body); }
    @keyframes zm-fade { from { opacity: 0 } to { opacity: 1 } }
    @keyframes zm-rise { from { transform: translateY(12px); opacity: 0 } to { transform: translateY(0); opacity: 1 } }
    button, input, select, textarea { font-family: inherit; }
    *:focus-visible { outline: none; box-shadow: var(--zm-ring-focus); }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: #262A38; border-radius: 999px; }
    ::-webkit-scrollbar-track { background: transparent; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="Primitives.jsx"></script>
  <script type="text/babel" src="Chrome.jsx"></script>
  <script type="text/babel" src="Command.jsx"></script>
  <script type="text/babel" src="Surfaces.jsx"></script>
  <script type="text/babel" src="App.jsx"></script>
</body>
</html>
